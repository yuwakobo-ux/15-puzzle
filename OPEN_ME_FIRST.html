<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Mini Slide Puzzle</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #17202a;
    }

    main {
      width: min(100%, 420px);
      padding: 22px;
      border: 1px solid #d7dee5;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }

    a {
      display: inline-grid;
      place-items: center;
      min-height: 48px;
      margin-top: 12px;
      padding: 0 18px;
      border-radius: 6px;
      background: #2f6f73;
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Mini Slide Puzzle</h1>
    <p>Open the static puzzle app.</p>
    <a href="index.html">Open Puzzle</a>
  </main>
</body>
</html>
