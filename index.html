<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mini Slide Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-labelledby="app-title">
    <header class="header">
      <h1 id="app-title">Mini Slide Puzzle</h1>
      <p class="version">Ver0.4</p>
      <p class="subtitle">Slide the tiles into order from 1 to 8.</p>
    </header>

    <section class="status" aria-live="polite">
      <div>
        <span class="label">Moves</span>
        <strong id="move-count">0</strong>
      </div>
      <p id="message" class="message">Ready</p>
    </section>

    <div class="mode-switch" aria-label="Puzzle mode">
      <button id="numbers-mode" class="mode-button active" type="button" aria-pressed="true">Numbers</button>
      <button id="image-mode" class="mode-button" type="button" aria-pressed="false">Image</button>
    </div>
    <p id="mode-label" class="mode-label" aria-live="polite">Mode: Numbers</p>
    <div id="theme-switch" class="theme-switch hidden" aria-label="Image theme">
      <button class="theme-button active" type="button" data-theme="flower" aria-pressed="true">Flower</button>
      <button class="theme-button" type="button" data-theme="sky" aria-pressed="false">Sky</button>
      <button class="theme-button" type="button" data-theme="japanese" aria-pressed="false">Japanese</button>
    </div>

    <section
      id="board"
      class="board"
      aria-label="3 by 3 sliding puzzle board"
    ></section>

    <div class="controls">
      <button id="shuffle-button" type="button">Shuffle</button>
      <button id="reset-button" type="button">Reset</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
